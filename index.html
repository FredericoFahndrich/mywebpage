<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDGE AI</title>
  <style>
    body { font-family: Arial; background:#0d1430; color:#fff; margin:0; }
    .container { max-width:900px; margin:auto; padding:20px; }
    textarea,input { width:100%; padding:10px; margin-top:5px; margin-bottom:10px; border-radius:8px; border:none; }
    button { padding:10px; border:none; border-radius:8px; cursor:pointer; background:#6ea8fe; color:#000; font-weight:bold; }
    button:disabled { opacity:0.65; cursor:not-allowed; }
    .chat { background:#121935; padding:15px; border-radius:10px; height:400px; overflow:auto; margin-bottom:10px; }

    .loading {
      display: none;
      text-align: center;
      margin: 10px 0;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #6ea8fe;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .msg { margin-bottom:10px; }
    .user { color:#6ea8fe; }
    .assistant { color:#32d296; }
  </style>
</head>
<body>
<div class="container">
  <h2>EDGE AI TEST HARDWARE ARM | RASPBERRY PI</h2>

  

  <label>Arquivos PDF</label>
  <input id="pdfFiles" type="file" accept="application/pdf,.pdf" multiple />
  <div id="selectedFiles" style="font-size:12px;color:#b9c3ff;margin-top:-4px;margin-bottom:12px;">Nenhum PDF selecionado.</div>

  <div class="chat" id="chat"></div>
  <div class="loading" id="loading"><div class="spinner"></div></div>

  <textarea id="input" placeholder="Digite sua mensagem..."></textarea>
  <button onclick="sendMessage()">Enviar</button>
</div>

<script>
const API_KEY = "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"; //fred
const MODEL = "gpt-5";

let messages = [];
let uploadedFileIds = [];

function render(){
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  messages.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.textContent = (m.role==='user'?'Você: ':'IA: ') + m.content;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}

function refreshSelectedFiles(){
  const files = document.getElementById('pdfFiles').files;
  const selectedFiles = document.getElementById('selectedFiles');
  if(!files || files.length === 0){
    selectedFiles.textContent = 'Nenhum PDF selecionado.';
    return;
  }
  selectedFiles.textContent = Array.from(files).map(f => `${f.name} (${Math.round(f.size/1024)} KB)`).join(' | ');
}

async function uploadPdfFiles(apiKey){
  const input = document.getElementById('pdfFiles');
  const files = Array.from(input.files || []);
  if(files.length === 0) return [];

  const ids = [];
  for(const file of files){
    const formData = new FormData();
    formData.append('purpose', 'user_data');
    formData.append('file', file);

    const response = await fetch('https://api.openai.com/v1/files', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + apiKey
      },
      body: formData
    });

    if(!response.ok){
      const errorText = await response.text();
      throw new Error(`Falha ao enviar ${file.name}: ${errorText}`);
    }

    const data = await response.json();
    ids.push({ id: data.id, name: file.name });
  }

  uploadedFileIds = ids;
  return ids;
}

function buildApiInput(currentText, fileRefs){
  const history = messages.map(m => ({
    role: m.role,
    content: [{
      type: m.role === 'assistant' ? 'output_text' : 'input_text',
      text: m.content
    }]
  }));

  const currentContent = [];
  if(currentText){
    currentContent.push({ type: 'input_text', text: currentText });
  }

  for(const fileRef of fileRefs){
    currentContent.push({ type: 'input_file', file_id: fileRef.id });
  }

  history.push({
    role: 'user',
    content: currentContent
  });

  return history;
}

async function sendMessage(){
  const apiKey = API_KEY;
  const loading = document.getElementById('loading');
  const sendButton = document.querySelector('button[onclick="sendMessage()"]');
  const model = MODEL;
  const input = document.getElementById('input');
  const text = input.value.trim();
  const pdfInput = document.getElementById('pdfFiles');
  const hasPdf = pdfInput.files && pdfInput.files.length > 0;

  if(!apiKey || apiKey === 'COLE_SUA_API_KEY_AQUI'){
    alert('Preencha a constante API_KEY no código antes de testar.');
    loading.style.display = 'none';
    return;
  }

  if(!text && !hasPdf){
    loading.style.display = 'none';
    return;
  }

  messages.push({role:'user', content: text || '[PDF enviado sem texto adicional]'});
  input.value='';
  render();

  try{
    loading.style.display = 'block';
    sendButton.disabled = true;

    const fileRefs = await uploadPdfFiles(apiKey);

    const response = await fetch('https://api.openai.com/v1/responses',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: model,
        input: buildApiInput(text, fileRefs)
      })
    });

    const data = await response.json();

    if(!response.ok){
      const errorMessage = data?.error?.message || 'Erro na chamada da API.';
      throw new Error(errorMessage);
    }

    let reply = data.output_text || 'Erro na resposta';

    if((!reply || reply === 'Erro na resposta') && data.output && data.output.length){
      const msg = data.output.find(o=>o.type==='message');
      if(msg && msg.content && msg.content.length){
        const textPart = msg.content.find(c => c.type === 'output_text' || c.type === 'text');
        if(textPart){
          reply = textPart.text || textPart.content || reply;
        }
      }
    }

    messages.push({role:'assistant', content:reply});
    loading.style.display = 'none';
    sendButton.disabled = false;
    pdfInput.value = '';
    refreshSelectedFiles();
    render();

  }catch(e){
    messages.push({role:'assistant', content:'Erro: '+e.message});
    loading.style.display = 'none';
    sendButton.disabled = false;
    render();
  }
}

document.getElementById('pdfFiles').addEventListener('change', refreshSelectedFiles);
</script>
</body>
</html>
